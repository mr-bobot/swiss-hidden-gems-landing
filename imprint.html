<style>
  *,*::before,*::after { box-sizing: border-box; }
  html,body { margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --fg: #1d1d1f;
    --muted: #6e6e73;
    --hairline: rgba(0,0,0,0.08);
    --accent: #0071e3;
  }
  body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) 22px env(safe-area-inset-bottom) 22px;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  a.back {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    width: fit-content;
  }
  a.back:hover { color: var(--fg); }
  h1 {
    font-family: "SF Pro Display", -apple-system, system-ui, sans-serif;
    font-size: 32px;
    line-height: 1.15;
    letter-spacing: -0.025em;
    margin: 0;
    font-weight: 600;
  }
  .block {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 20px 0;
    border-top: 1px solid var(--hairline);
  }
  .block:last-of-type { border-bottom: 1px solid var(--hairline); }
  .block-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  footer {
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
  }

<main>

  </div>

  <footer>© Hikebeast</footer>
</main>
